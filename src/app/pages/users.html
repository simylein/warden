										type="button"
										class="h-8 text-base font-normal pt-1 pr-4 pb-1 pl-4 border-0 text-black dark:text-white background-neutral-200 dark:background-neutral-800 outline-none cursor-pointer"
										onclick="
											highlightPermission(document.getElementById('update-uplink'), 3);
											updatePermission(updateForm, 4n);
										"
									>
										Delete
									</button>
								</div>
							</div>
							<div class="w-full flex flex-col items-start pb-4">
								<label for="update-downlink" class="mb-2 text-base font-normal">Downlink</label>
								<div id="update-downlink" class="w-full flex flex-row gap-2 overflow-x-auto scrollbar-none">
									<button
										type="button"
										class="h-8 text-base font-normal pt-1 pr-4 pb-1 pl-4 border-0 text-black dark:text-white background-neutral-200 dark:background-neutral-800 outline-none cursor-pointer"
										onclick="
											highlightPermission(document.getElementById('update-downlink'), 0);
											updatePermission(updateForm, 3n);
										"
									>
										Read
									</button>
									<button
										type="button"
										class="h-8 text-base font-normal pt-1 pr-4 pb-1 pl-4 border-0 text-black dark:text-white background-neutral-200 dark:background-neutral-800 outline-none cursor-pointer"
										onclick="
											highlightPermission(document.getElementById('update-downlink'), 1);
											updatePermission(updateForm, 2n);
										"
									>
										Create
									</button>
									<button
										type="button"
										class="h-8 text-base font-normal pt-1 pr-4 pb-1 pl-4 border-0 text-black dark:text-white background-neutral-200 dark:background-neutral-800 outline-none cursor-pointer"
										onclick="
											highlightPermission(document.getElementById('update-downlink'), 2);
											updatePermission(updateForm, 1n);
										"
									>
										Update
									</button>
									<button
										type="button"
										class="h-8 text-base font-normal pt-1 pr-4 pb-1 pl-4 border-0 text-black dark:text-white background-neutral-200 dark:background-neutral-800 outline-none cursor-pointer"
										onclick="
											highlightPermission(document.getElementById('update-downlink'), 3);
											updatePermission(updateForm, 0n);
										"
									>
										Delete
									</button>
								</div>
							</div>
						</div>
					</div>
					<div class="flex flex-row-reverse justify-start gap-2">
						<button
							id="update-button"
							type="submit"
							class="min-w-28 h-8 text-base font-normal pt-1 pr-4 pb-1 pl-4 border-0 text-black dark:text-white background-blue-300 dark:background-blue-700 outline-none cursor-pointer"
						>
							Update
						</button>
						<button
							class="min-w-28 h-8 text-base font-normal pt-1 pr-4 pb-1 pl-4 border-0 text-black dark:text-white background-neutral-300 dark:background-neutral-700 outline-none cursor-pointer"
							type="button"
							onclick="closeUpdateDialog()"
						>
							Cancel
						</button>
					</div>
				</form>
			</dialog>
			<dialog id="delete-dialog" class="w-full max-w-96 p-0 border-0 text-black dark:text-white background-neutral-100 dark:background-neutral-900">
				<form class="m-4 flex flex-col gap-2" onsubmit="deleteForm.handleSubmit(event)">
					<h1 class="m-0 text-xl font-medium">Delete user?</h1>
					<p class="m-0 text-base font-normal">Deleting this user will remove access and all affected user devices.</p>
					<div class="flex flex-row-reverse justify-start gap-2">
						<button
							id="delete-button"
							type="submit"
							class="min-w-28 h-8 text-base font-normal pt-1 pr-4 pb-1 pl-4 border-0 text-black dark:text-white background-red-300 dark:background-red-700 outline-none cursor-pointer"
						>
							Delete
						</button>
						<button
							class="min-w-28 h-8 text-base font-normal pt-1 pr-4 pb-1 pl-4 border-0 text-black dark:text-white background-neutral-300 dark:background-neutral-700 outline-none cursor-pointer"
							type="button"
							onclick="closeDeleteDialog()"
						>
							Cancel
						</button>
					</div>
				</form>
			</dialog>
		</main>
		<footer class="w-full background-neutral-100 dark:background-neutral-900">
			<div
				class="flex flex-row justify-between gap-2 sm:gap-3 lg:gap-4 pt-2 sm:pt-3 lg:pt-4 pr-4 sm:pr-6 lg:pr-8 pb-2 sm:pb-3 lg:pb-4 pl-4 sm:pl-6 lg:pl-8 text-lg font-normal text-nowrap overflow-x-auto scrollbar-none"
			>
				<p class="m-0 text-xs font-normal text-neutral-400 dark:text-neutral-600">warden {version} {commit}</p>
				<p class="m-0 text-xs font-normal text-neutral-400 dark:text-neutral-600">written by simylein</p>
			</div>
		</footer>
	</body>
	<script>
		import './src/app/scripts/array.js';
		import './src/app/scripts/resize.js';
		import './src/app/scripts/timestamp.js';
		import './src/app/scripts/state.js';
		import './src/app/scripts/fade.js';
		import './src/app/scripts/search.js';
		import './src/app/scripts/binary.js';
		import './src/app/scripts/fetcher.js';
		import './src/app/scripts/fetching.js';
		import './src/app/scripts/formik.js';
		import './src/app/scripts/report.js';
		import './src/app/scripts/notification.js';
		const users = { retries: 0, reload: 10, timeout: null, controller: null, data: null, element: document.getElementById('users') };
		const columns = {
			id: document.getElementById('id'),
			username: document.getElementById('username'),
			signupAt: document.getElementById('signup-at'),
			signinAt: document.getElementById('signin-at'),
		};
		const paintSorting = (column) => {
			const element = columns[column];
			const sort = element.getAttribute('sort') === 'asc' ? 'desc' : 'asc';
			Object.keys(columns).forEach((col) => {
				columns[col].removeAttribute('sort');
				columns[col].children[0].classList.add('hidden');
				columns[col].children[1].classList.add('hidden');
			});
			element.setAttribute('sort', sort);
			switch (true) {
				case sort === 'asc':
					element.children[0].classList.remove('hidden');
					break;
				case sort === 'desc':
					element.children[1].classList.remove('hidden');
					break;
			}
			setParam('order', column);
			setParam('sort', sort);
		};
		const loadingUsers = (element) => {
			array(element.children.length).forEach((ind) => {
				loading(element.children[ind].children[0].children[0], ['w-10', 'h-4'], [], '');
				element.children[ind].children[0].classList.remove('cursor-pointer');
				loading(element.children[ind].children[1].children[0], ['w-32', 'h-4'], [], '');
				element.children[ind].children[1].classList.remove('cursor-pointer');
				loading(element.children[ind].children[2].children[0], ['w-40', 'h-4'], [], '');
				element.children[ind].children[2].classList.remove('cursor-pointer');
				loading(element.children[ind].children[3].children[0], ['w-40', 'h-4'], [], '');
				element.children[ind].children[3].classList.remove('cursor-pointer');
				loading(element.children[ind].children[4].children[0], ['w-40', 'h-4'], [], '');
				element.children[ind].children[4].classList.remove('cursor-pointer');
				element.children[ind].children[5].children[0].children[0].classList.remove('cursor-pointer');
				element.children[ind].children[5].children[0].children[0].classList.add('opacity-50', 'cursor-not-allowed');
				element.children[ind].children[5].children[0].children[0].onclick = null;
				element.children[ind].children[5].children[0].children[1].classList.remove('cursor-pointer');
				element.children[ind].children[5].children[0].children[1].classList.add('opacity-50', 'cursor-not-allowed');
				element.children[ind].children[5].children[0].children[1].onclick = null;
			});
		};
		const paintUsers = (element, data) => {
			resize(element, data.length > 0 ? data.length : 1);
			array(element.children.length).forEach((ind) => {
				if (data[ind]) {
					paint(element.children[ind].children[0].children[0], [], ['w-10', 'h-4'], data[ind].id.substring(0, 4));
					element.children[ind].children[0].classList.add('cursor-pointer');
					element.children[ind].children[0].onclick = () => (window.location.href = `/user/${data[ind].id}`);
					paint(element.children[ind].children[1].children[0], [], ['w-32', 'h-4'], data[ind].username);
					element.children[ind].children[1].classList.add('cursor-pointer');
					element.children[ind].children[1].onclick = () => (window.location.href = `/user/${data[ind].id}`);
					paint(element.children[ind].children[2].children[0], [], ['w-40', 'h-4'], timestamp(data[ind].signupAt));
					element.children[ind].children[2].classList.add('cursor-pointer');
					element.children[ind].children[2].onclick = () => (window.location.href = `/user/${data[ind].id}`);
					paint(element.children[ind].children[3].children[0], [], ['w-40', 'h-4'], timestamp(data[ind].signinAt));
					element.children[ind].children[3].classList.add('cursor-pointer');
					element.children[ind].children[3].onclick = () => (window.location.href = `/user/${data[ind].id}`);
					paint(element.children[ind].children[4].children[0], [], ['w-40', 'h-4'], data[ind].permissions);
					element.children[ind].children[4].classList.add('cursor-pointer');
					element.children[ind].children[4].onclick = () => (window.location.href = `/user/${data[ind].id}`);
					element.children[ind].children[5].children[0].children[0].classList.remove('opacity-50', 'cursor-not-allowed');
					element.children[ind].children[5].children[0].children[0].classList.add('cursor-pointer');
					element.children[ind].children[5].children[0].children[0].onclick = () => openUpdateDialog(data[ind]);
					element.children[ind].children[5].children[0].children[1].classList.remove('opacity-50', 'cursor-not-allowed');
					element.children[ind].children[5].children[0].children[1].classList.add('cursor-pointer');
					element.children[ind].children[5].children[0].children[1].onclick = () => openDeleteDialog(data[ind]);
				}
			});
		};
		const errorUsers = (element) => {
			array(element.children.length).forEach((ind) => {
				error(element.children[ind].children[0].children[0], ['w-10', 'h-4'], [], '');
				element.children[ind].children[0].classList.remove('cursor-pointer');
				error(element.children[ind].children[1].children[0], ['w-32', 'h-4'], [], '');
				element.children[ind].children[1].classList.remove('cursor-pointer');
				error(element.children[ind].children[2].children[0], ['w-40', 'h-4'], [], '');
				element.children[ind].children[2].classList.remove('cursor-pointer');
				error(element.children[ind].children[3].children[0], ['w-40', 'h-4'], [], '');
				element.children[ind].children[3].classList.remove('cursor-pointer');
				error(element.children[ind].children[4].children[0], ['w-40', 'h-4'], [], '');
				element.children[ind].children[4].classList.remove('cursor-pointer');
				element.children[ind].children[5].children[0].children[0].classList.remove('cursor-pointer');
				element.children[ind].children[5].children[0].children[0].classList.add('opacity-50', 'cursor-not-allowed');
				element.children[ind].children[5].children[0].children[0].onclick = null;
				element.children[ind].children[5].children[0].children[1].classList.remove('cursor-pointer');
				element.children[ind].children[5].children[0].children[1].classList.add('opacity-50', 'cursor-not-allowed');
				element.children[ind].children[5].children[0].children[1].onclick = null;
			});
		};
		const parseUsers = async (response) => {
			const buffer = await response.arrayBuffer();
			const binary = new Binary(buffer);
			const users = [];
			while (binary.offset < buffer.byteLength) {
				const user = { id: null, username: null, signupAt: null, signinAt: null, permissions: null };
				user.id = binary.uuid();
				user.username = binary.string();
				user.signupAt = binary.uint(64);
				user.signinAt = binary.uint(64);
				user.permissions = binary.hex(8);
				users.push(user);
			}
			return users;
		};
		const loadUsers = fetching(
			users,
			(context) => window.requestAnimationFrame(() => loadingUsers(context.element)),
			(context) => {
				const endpoint = `/api/users?order=${getParam('order', 'id')}&sort=${getParam('sort', 'asc')}`;
				return fetcher('get', endpoint, null, { controller: context.controller });
			},
			async (context, response) => (context.data = await parseUsers(response)),
			(context) => window.requestAnimationFrame(() => paintUsers(context.element, context.data)),
			(context) => window.requestAnimationFrame(() => errorUsers(context.element)),
		);
		const highlightPermission = (element, ind) => {
			switch (ind) {
				case 0:
					if (element.children[ind].classList.contains('background-neutral-200') && element.children[ind].classList.contains('dark:background-neutral-800')) {
						fade(element.children[ind]);
						element.children[ind].classList.add('text-blue-600', 'dark:text-blue-400', 'background-blue-100', 'dark:background-blue-900');
					} else {
						fade(element.children[ind]);
						element.children[ind].classList.add('text-black', 'dark:text-white', 'background-neutral-200', 'dark:background-neutral-800');
					}
					break;
				case 1:
					if (element.children[ind].classList.contains('background-neutral-200') && element.children[ind].classList.contains('dark:background-neutral-800')) {
						fade(element.children[ind]);
						element.children[ind].classList.add('text-green-600', 'dark:text-green-400', 'background-green-100', 'dark:background-green-900');
					} else {
						fade(element.children[ind]);
						element.children[ind].classList.add('text-black', 'dark:text-white', 'background-neutral-200', 'dark:background-neutral-800');
					}
					break;
				case 2:
					if (element.children[ind].classList.contains('background-neutral-200') && element.children[ind].classList.contains('dark:background-neutral-800')) {
						fade(element.children[ind]);
						element.children[ind].classList.add('text-yellow-600', 'dark:text-yellow-400', 'background-yellow-100', 'dark:background-yellow-900');
					} else {
						fade(element.children[ind]);
						element.children[ind].classList.add('text-black', 'dark:text-white', 'background-neutral-200', 'dark:background-neutral-800');
					}
					break;
				case 3:
					if (element.children[ind].classList.contains('background-neutral-200') && element.children[ind].classList.contains('dark:background-neutral-800')) {
						fade(element.children[ind]);
						element.children[ind].classList.add('text-red-600', 'dark:text-red-400', 'background-red-100', 'dark:background-red-900');
					} else {
						fade(element.children[ind]);
						element.children[ind].classList.add('text-black', 'dark:text-white', 'background-neutral-200', 'dark:background-neutral-800');
					}
					break;
			}
		};
		const updatePermission = (form, ind) => {
			let permissions = BigInt('0x' + form.values.permissions);
			permissions = permissions ^ (1n << ind);
			form.setValue('permissions', permissions.toString(16));
		};
		const updateDialog = document.getElementById('update-dialog');
		const deleteDialog = document.getElementById('delete-dialog');
		const openUpdateDialog = (user) => {
			const permissions = BigInt('0x' + user.permissions);
			const permission = {
				user: { read: 1n << 63n, create: 1n << 62n, update: 1n << 61n, delete: 1n << 60n },
				'user-device': { read: 1n << 59n, create: 1n << 58n, update: 1n << 57n, delete: 1n << 56n },
				'user-zone': { read: 1n << 55n, create: 1n << 54n, update: 1n << 53n, delete: 1n << 52n },
				device: { read: 1n << 51n, create: 1n << 50n, update: 1n << 49n, delete: 1n << 48n },
				zone: { read: 1n << 47n, create: 1n << 46n, update: 1n << 45n, delete: 1n << 44n },
				config: { read: 1n << 43n, create: 1n << 42n, update: 1n << 41n, delete: 1n << 40n },
				radio: { read: 1n << 39n, create: 1n << 38n, update: 1n << 37n, delete: 1n << 36n },
				rule: { read: 1n << 35n, create: 1n << 34n, update: 1n << 33n, delete: 1n << 32n },
				uplink: { read: 1n << 7n, create: 1n << 6n, update: 1n << 5n, delete: 1n << 4n },
				downlink: { read: 1n << 3n, create: 1n << 2n, update: 1n << 1n, delete: 1n << 0n },
			};
			Object.keys(permission).forEach((key) => {
				Object.keys(permission[key]).forEach((k, i) => {
					const element = document.getElementById(`update-${key}`);
					fade(element.children[i]);
					element.children[i].classList.add('text-black', 'dark:text-white', 'background-neutral-200', 'dark:background-neutral-800');
					if (permissions & permission[key][k]) {
						highlightPermission(element, i);
					}
				});
			});
			updateForm.setValue('userId', user.id);
			updateForm.setTouched('userId', true);
			updateForm.setValue('permissions', user.permissions);
			updateForm.setTouched('permissions', true);
			updateDialog.showModal();
		};
		const closeUpdateDialog = () => {
			updateForm.reset();
			updateDialog.close();
		};
		const openDeleteDialog = (user) => {
			deleteForm.setValue('userId', user.id);
			deleteForm.setTouched('userId', true);
			deleteDialog.showModal();
		};
		const closeDeleteDialog = () => {
			deleteForm.reset();
			deleteDialog.close();
		};
		const updateForm = formik(
			{
				button: document.getElementById('update-button'),
			},
			{
				userId: (value) => {
					if (!value) return 'user id is required';
					if (value.length !== 16) return 'user id must be 16 characters';
					if (!value.match(/^[0-9a-f]+$/)) return 'user id must be lowercase hexadecimal';
				},
				permissions: (value) => {
					if (!value) return 'permissions is required';
					if (value.length !== 16) return 'permissions must be 16 characters';
					if (!value.match(/^[0-9a-f]+$/)) return 'permissions must be lowercase hexadecimal';
				},
			},
			async (values) => {
				const bytes = new Uint8Array(8);
				const view = new DataView(bytes.buffer);
				view.setBigUint64(0, BigInt('0x' + values.permissions));
				const data = new Blob([bytes]);
				try {
					await fetcher('patch', `/api/user/${values.userId}`, data, { headers: { 'content-type': 'application/octet-stream' } });
					notification('success', 'Successfully updated user');
					loadUsers(true);
				} catch (err) {
					report(err);
				}
				closeUpdateDialog();
			},
		);
		const deleteForm = formik(
			{
				button: document.getElementById('delete-button'),
			},
			{
				userId: (value) => {
					if (!value) return 'user id is required';
					if (value.length !== 16) return 'user id must be 16 characters';
					if (!value.match(/^[0-9a-f]+$/)) return 'user id must be lowercase hexadecimal';
				},
			},
			async (values) => {
				try {
					await fetcher('delete', `/api/user/${values.userId}`, null, { headers: { 'content-type': 'application/octet-stream' } });
					notification('success', 'Successfully deleted user');
					loadUsers(true);
				} catch (err) {
					report(err);
				}
				closeDeleteDialog();
			},
		);
	</script>
</html>
